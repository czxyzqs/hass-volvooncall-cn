[pytest]
# Pytest configuration for Home Assistant custom component testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration (required for pytest-asyncio)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage options
[coverage:run]
source = custom_components.volvooncall_cn
omit =
    */proto/*
    */__pycache__/*
    */tests/*

[coverage:report]
# Require minimum 50% coverage
fail_under = 50
precision = 2
show_missing = true
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Test output options
addopts =
    --strict-markers
    --cov=custom_components.volvooncall_cn
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    -v
    --tb=short

# Custom markers for different test types
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external resources)
    slow: Slow running tests

# Timeout for tests (prevent hanging)
timeout = 10

# Test paths
testpaths = tests

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    custom_components/volvooncall_cn/proto
